name: Weekly AI News

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          MODEL_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MODEL_BASE_URL: ${{ vars.MODEL_BASE_URL }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/weekly_ai_news.py

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/
          git commit -m "Add weekly AI news report" || echo "No changes to commit"
          git push
